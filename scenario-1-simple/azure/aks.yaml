apiVersion: containerservice.azure.upbound.io/v1beta2
kind: KubernetesCluster
metadata:
  name: aks-app-prod
spec:
  forProvider:
    resourceGroupNameRef:
      name: rg-app-prod-aue
    location: australiaeast
    kubernetesVersion: "1.30"
    dnsPrefix: aks-app-prod
    defaultNodePool:
      - name: system
        vmSize: Standard_D4ds_v5
        nodeCount: 3
        minCount: 2
        maxCount: 6
        enableAutoScaling: true
        osDiskSizeGb: 128
        vnetSubnetIdRef:
          name: snet-aks
    networkProfile:
      - networkPlugin: azure
        networkPolicy: calico
        serviceCidr: 172.16.0.0/16
        dnsServiceIp: 172.16.0.10
    identity:
      - type: SystemAssigned
    tags:
      Environment: production
  providerConfigRef:
    name: azure-prod
